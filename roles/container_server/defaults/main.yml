---
# Common deployment-model interface — identical across the container_server /
# systemd_server / kubernetes_server roles so callers can switch models without
# renaming variables (BLUEPRINTS_VARIABLE_STANDARDS.md §5).
jenkins_server_image: ""              # REQUIRED: caller-supplied image/package ref; no org default
jenkins_server_http_port: 8080
jenkins_server_https_port: 8443
jenkins_server_data_dir: "/var/lib/jenkins"
jenkins_server_tls_cert: ""           # when set (with key), TLS is enabled automatically
jenkins_server_tls_key: ""
jenkins_server_admin_secret: ""       # caller-supplied secret; never retrieved by this role
# uid/gid are left unset (null) by default: the OS picks the next free
# system id (system: true), which tasks/main.yml then captures and uses for
# docker_container's user: param (LADR-009). A fixed numeric default (1000)
# is not safe -- it's the same uid Ubuntu cloud-init typically assigns to the
# first regular login user (e.g. "ubuntu"), so it routinely collides. Set
# these explicitly only if you need a specific, pre-reserved id.
jenkins_server_uid: null
jenkins_server_gid: null

# Vault AppRole authentication (optional; for jenkins_integrations.vault_auth role to fill)
jenkins_server_vault_url: ""          # HTTPS URL to Vault (e.g., https://vault.local:8443)
jenkins_server_vault_role_id: ""      # AppRole role_id from Vault (from vault_integrations.vault_auth)
jenkins_server_vault_secret_id: ""    # AppRole secret_id from Vault (from vault_integrations.vault_auth)
