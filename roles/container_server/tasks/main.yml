---
# container_server: Deploy Jenkins master container with TLS and Vault integration.
#
# Responsibilities (per design):
#   1. Assert jenkins_server_image is supplied (no org default)
#   2. Assert TLS cert + key are supplied by caller (fail-fast if missing)
#   3. Create jenkins user/group and data directory with restrictive perms
#   4. Write TLS cert and key to secure paths (from step-ca)
#   5. Render jenkins configuration files (groovy init scripts for Vault auth)
#   6. Mount TLS certs and config into Jenkins container
#   7. Start/restart Jenkins container via community.docker.docker_container
#   8. Expose Jenkins API address as fact for platform-layer consumers
#   9. Configure AppRole Vault auth (role_id + secret_id from caller)
#
# Constraints:
#   - Idempotence-first: use community.docker.docker_container in declarative mode
#   - No_log on any task handling TLS keys, passwords, or Vault secrets
#   - Fail-fast asserts on required inputs before any container starts
#   - No include_role / import_role of other blueprints.* collections
#   - All configuration from caller-supplied variables; no external retrieval
#   - Non-root container: jenkins:jenkins user (per Docker image defaults)
#   - TLS required (per design Decision 5, mandate TLS even for dev)

- name: Assert required inputs are supplied by the caller
  ansible.builtin.assert:
    that:
      - jenkins_server_image | length > 0
      - jenkins_server_tls_cert | length > 0
      - jenkins_server_tls_key | length > 0
    fail_msg: |
      Required inputs missing:
        - jenkins_server_image: Container image reference (caller-supplied; no org default). Example: 'jenkins/jenkins:2.387.1-jdk11'
        - jenkins_server_tls_cert: TLS certificate (PEM-encoded, from step-ca or caller-supplied)
        - jenkins_server_tls_key: TLS private key (PEM-encoded, from step-ca or caller-supplied)
    success_msg: "Required inputs present (image + TLS cert + TLS key)."
  no_log: false
  tags:
    - container_server

- name: Create jenkins group
  ansible.builtin.group:
    name: jenkins
    gid: "{{ jenkins_server_gid | default(omit) }}"
    system: true
    state: present
  register: jenkins_server_group_result
  tags:
    - container_server

- name: Create jenkins user and group
  ansible.builtin.user:
    name: jenkins
    uid: "{{ jenkins_server_uid | default(omit) }}"
    group: jenkins
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  register: jenkins_server_user_result
  tags:
    - container_server

- name: Capture the actual uid/gid assigned (whether fixed or OS-allocated)
  ansible.builtin.set_fact:
    jenkins_server_actual_uid: "{{ jenkins_server_user_result.uid }}"
    jenkins_server_actual_gid: "{{ jenkins_server_group_result.gid }}"
  tags:
    - container_server

- name: Create jenkins data directory with restrictive permissions
  ansible.builtin.file:
    path: "{{ jenkins_server_data_dir }}"
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0700"
  tags:
    - container_server

- name: Create jenkins config directory
  ansible.builtin.file:
    path: "{{ jenkins_server_data_dir }}/config"
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0700"
  tags:
    - container_server

- name: Write TLS certificate to secure location
  ansible.builtin.copy:
    content: "{{ jenkins_server_tls_cert }}"
    dest: "{{ jenkins_server_data_dir }}/config/jenkins.crt"
    owner: jenkins
    group: jenkins
    mode: "0600"
  tags:
    - container_server

- name: Write TLS private key to secure location
  ansible.builtin.copy:
    content: "{{ jenkins_server_tls_key }}"
    dest: "{{ jenkins_server_data_dir }}/config/jenkins.key"
    owner: jenkins
    group: jenkins
    mode: "0600"
  no_log: true
  tags:
    - container_server

- name: Create jenkins init scripts directory for Groovy configuration
  ansible.builtin.file:
    path: "{{ jenkins_server_data_dir }}/init.groovy.d"
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0700"
  tags:
    - container_server

- name: Render Vault plugin configuration script (if Vault AppRole supplied)
  ansible.builtin.template:
    src: vault-plugin-init.groovy.j2
    dest: "{{ jenkins_server_data_dir }}/init.groovy.d/vault-plugin.groovy"
    owner: jenkins
    group: jenkins
    mode: "0600"
  no_log: true
  when:
    - jenkins_server_vault_role_id | length > 0
    - jenkins_server_vault_secret_id | length > 0
  tags:
    - container_server

- name: Start/restart Jenkins container
  community.docker.docker_container:
    name: jenkins
    image: "{{ jenkins_server_image }}"
    state: started
    restart_policy: unless-stopped
    user: "{{ jenkins_server_actual_uid }}:{{ jenkins_server_actual_gid }}"
    cap_drop:
      - ALL
    ports:
      - "{{ jenkins_server_https_port }}:8443"
      - "50000:50000"
    volumes:
      - "{{ jenkins_server_data_dir }}:/var/jenkins_home"
      - "{{ jenkins_server_data_dir }}/config/jenkins.crt:/etc/jenkins/tls/jenkins.crt:ro"
      - "{{ jenkins_server_data_dir }}/config/jenkins.key:/etc/jenkins/tls/jenkins.key:ro"
    env:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      CASC_JENKINS_CONFIG: "/var/jenkins_home/jenkins.yaml"
  tags:
    - container_server

- name: Expose HTTPS listener address as fact
  ansible.builtin.set_fact:
    jenkins_server_https_address: "https://localhost:{{ jenkins_server_https_port }}"
  tags:
    - container_server

- name: Container server convergence complete
  ansible.builtin.debug:
    msg: |
      container_server role complete.
      Jenkins container running with TLS listener and Vault AppRole auth.
        - HTTPS listener: {{ jenkins_server_https_address }}
        - Data directory: {{ jenkins_server_data_dir }}
        - TLS certificates loaded from config directory
        - Vault AppRole auth configured (if role_id + secret_id supplied)
  tags:
    - container_server
