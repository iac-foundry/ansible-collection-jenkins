---
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Restart Jenkins inbound agent (systemd)
  ansible.builtin.systemd:
    name: "{{ jenkins_agent_hosts_systemd_service_name }}"
    state: restarted
    daemon_reload: true
  become: true
  when: jenkins_agent_hosts_controller_mode == 'systemd'
