---
# Multi-org defaults: consumer repos must override environment-specific values
# (controller URL, CA endpoint, Vault address/paths, SSH paths, DNS mappings).
jenkins_agent_manage_custom_image: true
jenkins_agent_base_image: "jenkins/inbound-agent:jdk21"
jenkins_agent_container_image: "blueprint_jenkins_inbound_agent:jdk21-tools"
jenkins_agent_ansible_core_version: "2.18.3"
jenkins_agent_install_hashicorp_tools: true
jenkins_agent_install_terraform: true
jenkins_agent_install_packer: true
jenkins_agent_container_name_prefix: "jenkins-inbound-agent"
jenkins_agent_tmp_tmpfs_size: "5g"
jenkins_agent_workspace_tmpfs_size: "5g"
jenkins_agent_container_uid: "1000"
jenkins_agent_container_gid: "1000"
jenkins_agent_controller_url: "https://{{ jenkins_proxy_server_name }}"
jenkins_agent_controller_mode: "container"

# Systemd mode — only used when jenkins_agent_controller_mode == 'systemd'
# Hostnames to add to /etc/ssh/ssh_known_hosts so git checkouts work without
# interactive host key prompts. Keys are fetched from the Ansible controller.
jenkins_agent_ssh_known_hosts: []
jenkins_agent_deploy_private_key: ""
jenkins_agent_deploy_key_path: "{{ jenkins_agent_systemd_install_dir }}/.ssh/id_ed25519_infraops"
jenkins_agent_systemd_user: "jenkins"
jenkins_agent_systemd_group: "jenkins"
jenkins_agent_systemd_install_dir: "/opt/jenkins"
jenkins_agent_systemd_env_dir: "/etc/jenkins-inbound-agent"
jenkins_agent_systemd_service_name: "jenkins-inbound-agent"
jenkins_agent_java_package: "openjdk-21-jre-headless"
jenkins_agent_controller_validate_tls: true
jenkins_agent_use_websocket: true
jenkins_agent_ca_bootstrap_url: "http://vault.iotel.internal/root_ca.crt"
jenkins_agent_ca_cert_alias: "platform-step-ca-root"
jenkins_agent_ca_truststore_password: "changeit"
# Vault address reachable from inside the agent container.
# Points to the host's Vault Agent via the docker bridge gateway.
jenkins_agent_vault_addr: "http://172.17.0.1:8100"
jenkins_agent_static_etc_hosts: {}
jenkins_agent_git_key_src_path: "{{ jenkins_git_ssh_key_host_path | default('/home/jenkins/.ssh/id_rsa_bitbucket') }}"
jenkins_agent_git_key_stage_path: "{{ jenkins_home }}/git_id_ed25519"
jenkins_agent_infra_key_src_path: "/home/jenkins/.ssh/id_ed25519_infraops"
jenkins_agent_infra_key_dst_path: "/home/jenkins/.ssh/id_ed25519_infraops"
# How long (seconds) to wait for Jenkins controller secret files to appear
jenkins_agent_secret_wait_timeout: 300
# When true, hide derived secret command output in logs
jenkins_agent_secret_hide_output: true
# Guardrail: when running inside Jenkins, skip mutating the worker host that
# matches the currently executing Jenkins node to avoid self-disconnect/workspace loss.
jenkins_agent_skip_current_executor_host: true
