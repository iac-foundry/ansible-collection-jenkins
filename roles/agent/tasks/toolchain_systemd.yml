---
# Install the CI toolchain on a systemd-mode host agent so deployment
# pipelines run with the same tools baked into the container image:
#   - ansible-core (ansible-playbook / ansible-galaxy / ansible-inventory)
#   - terraform, packer, vault (HashiCorp apt repo)
# Mirrors templates/Dockerfile_Jenkins_Agent.j2 to keep host and container
# agents at parity. Requires outbound internet access.

- name: Install base packages for Jenkins agent toolchain
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - gnupg
      - python3
      - python3-pip
      - xorriso
      - unzip
    state: present
    update_cache: true
  become: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: jenkins_agent_install_hashicorp_tools | bool

- name: Add HashiCorp apt signing key
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /etc/apt/keyrings/hashicorp.asc
    mode: '0644'
  become: true
  when: jenkins_agent_install_hashicorp_tools | bool

- name: Add HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    filename: hashicorp
    state: present
    update_cache: true
  become: true
  when: jenkins_agent_install_hashicorp_tools | bool

- name: Install HashiCorp tools
  ansible.builtin.apt:
    name: "{{ ['vault']
              + (['terraform'] if jenkins_agent_install_terraform | bool else [])
              + (['packer'] if jenkins_agent_install_packer | bool else []) }}"
    state: present
  become: true
  when: jenkins_agent_install_hashicorp_tools | bool

- name: Install ansible-core via pip
  ansible.builtin.pip:
    name: "ansible-core=={{ jenkins_agent_ansible_core_version }}"
    state: present
    extra_args: --break-system-packages
  become: true
