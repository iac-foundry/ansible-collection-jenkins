---
# Build a deterministic inbound-agent image that includes the tooling required
# by deployment pipelines executed on Jenkins worker containers.

- name: Render Dockerfile for Jenkins inbound worker tooling image
  ansible.builtin.template:
    src: Dockerfile_Jenkins_Agent.j2
    dest: /tmp/Dockerfile_Jenkins_Agent
    mode: '0644'
  register: jenkins_agent_dockerfile_copy
  when: jenkins_agent_manage_custom_image | bool

- name: Check whether custom inbound worker image exists
  community.docker.docker_image_info:
    name: "{{ jenkins_agent_container_image }}"
  register: jenkins_agent_existing_image_info
  when: jenkins_agent_manage_custom_image | bool

- name: Build custom inbound worker image with Ansible/Terraform/Packer
  community.docker.docker_image:
    name: "{{ jenkins_agent_container_image }}"
    build:
      path: /tmp
      dockerfile: Dockerfile_Jenkins_Agent
    source: build
    force_source: "{{ jenkins_agent_dockerfile_copy.changed }}"
  when:
    - jenkins_agent_manage_custom_image | bool
    - jenkins_agent_dockerfile_copy.changed or (jenkins_agent_existing_image_info.images | default([]) | length == 0)
