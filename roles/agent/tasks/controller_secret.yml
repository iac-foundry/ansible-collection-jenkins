---
# Secrets: bootstrap the CA certificate for TLS verification and derive the
# per-node inbound agent secret from Jenkins controller state.

# CA bootstrap is only needed for container mode — the cert must be installed
# inside the Docker image. Systemd mode inherits the system trust store which
# ca_trust_bootstrap has already populated as part of the host baseline.

- name: Fetch Step CA root certificate for in-container TLS bootstrap
  ansible.builtin.uri:
    url: "{{ jenkins_agent_hosts_ca_bootstrap_url }}"
    method: GET
    return_content: true
    status_code: 200
    validate_certs: false
  register: jenkins_agent_hosts_ca_bootstrap_response
  changed_when: false
  when:
    - jenkins_agent_hosts_controller_mode == 'container'
    - jenkins_agent_hosts_controller_validate_tls | bool

- name: Fail when Step CA bootstrap certificate content is empty
  ansible.builtin.fail:
    msg: >-
      CA bootstrap URL {{ jenkins_agent_hosts_ca_bootstrap_url }} returned empty content.
      Cannot keep TLS verification enabled for Jenkins inbound agents.
  when:
    - jenkins_agent_hosts_controller_mode == 'container'
    - jenkins_agent_hosts_controller_validate_tls | bool
    - (jenkins_agent_hosts_ca_bootstrap_response.content | default('') | trim) == ''
    - not ansible_check_mode

- name: Read local Step CA root certificate when bootstrap URL is empty
  ansible.builtin.slurp:
    src: /usr/local/share/ca-certificates/step-ca-root.crt
  register: jenkins_agent_hosts_ca_local_cert
  changed_when: false
  failed_when: false
  when:
    - jenkins_agent_hosts_controller_mode == 'container'
    - jenkins_agent_hosts_controller_validate_tls | bool
    - (jenkins_agent_hosts_ca_bootstrap_response.content | default('') | trim) == ''

- name: Resolve Jenkins agent CA certificate content
  ansible.builtin.set_fact:
    jenkins_agent_hosts_ca_cert_pem: >-
      {{
        (jenkins_agent_hosts_ca_bootstrap_response.content | default('') | trim)
        if (jenkins_agent_hosts_ca_bootstrap_response.content | default('') | trim) != ''
        else (jenkins_agent_hosts_ca_local_cert.content | default('') | b64decode | trim)
      }}
  when:
    - jenkins_agent_hosts_controller_mode == 'container'
    - jenkins_agent_hosts_controller_validate_tls | bool

- name: Fail when Jenkins agent CA certificate content is still empty
  ansible.builtin.fail:
    msg: >-
      Jenkins agent TLS is enabled, but no CA certificate content was available from
      {{ jenkins_agent_hosts_ca_bootstrap_url }} or /usr/local/share/ca-certificates/step-ca-root.crt.
  when:
    - jenkins_agent_hosts_controller_mode == 'container'
    - jenkins_agent_hosts_controller_validate_tls | bool
    - (jenkins_agent_hosts_ca_cert_pem | default('') | trim) == ''
    - not ansible_check_mode


- name: Wait for Jenkins controller secret files to appear
  ansible.builtin.wait_for:
    path: "{{ jenkins_home }}/secrets/master.key"
    state: present
    timeout: "{{ jenkins_agent_hosts_secret_wait_timeout }}"
  delegate_to: "{{ jenkins_controller_host }}"
  changed_when: false
  when: not ansible_check_mode
  tags:
    - jenkins

- name: Wait for Jenkins protocol secret file to appear
  ansible.builtin.wait_for:
    path: "{{ jenkins_home }}/secrets/jenkins.slaves.JnlpSlaveAgentProtocol.secret"
    state: present
    timeout: "{{ jenkins_agent_hosts_secret_wait_timeout }}"
  delegate_to: "{{ jenkins_controller_host }}"
  changed_when: false
  when: not ansible_check_mode
  tags:
    - jenkins

- name: Compute inbound agent secret from Jenkins controller state
  ansible.builtin.shell: |
    set -euo pipefail

    secret_dir='{{ jenkins_home }}/secrets'
    master_key_file="$secret_dir/master.key"
    protocol_secret_file="$secret_dir/jenkins.slaves.JnlpSlaveAgentProtocol.secret"
    magic_suffix_hex='3a3a3a3a4d414749433a3a3a3a'

    [ -r "$master_key_file" ]
    [ -r "$protocol_secret_file" ]

    master_key=$(tr -d '\n' < "$master_key_file")
    aes_key_hex=$(printf '%s' "$master_key" | sha256sum | awk '{print substr($1,1,32)}')
    protocol_key_hex=$(
      openssl enc -d -aes-128-ecb -nosalt -K "$aes_key_hex" -in "$protocol_secret_file" \
      | xxd -p -c 9999 \
      | sed "s/${magic_suffix_hex}$//"
    )

    if [ -z "$protocol_key_hex" ]; then
      echo 'Failed to derive Jenkins inbound agent protocol key' >&2
      exit 1
    fi

    printf '%s' '{{ jenkins_agent_hosts_node_local.name }}' \
      | openssl dgst -sha256 -mac HMAC -macopt hexkey:"$protocol_key_hex" \
      | awk '{print $2}'
  args:
    executable: /bin/bash
  delegate_to: "{{ jenkins_controller_host }}"
  register: jenkins_agent_hosts_secret_cmd
  changed_when: false
  no_log: "{{ jenkins_agent_hosts_secret_hide_output | default(true) }}"
  when: not ansible_check_mode

- name: Seed placeholder inbound agent secret for check mode
  ansible.builtin.set_fact:
    jenkins_agent_hosts_secret_cmd:
      stdout: "check-mode-placeholder"
  changed_when: false
  when: ansible_check_mode

- name: Fail when inbound agent secret could not be resolved
  ansible.builtin.fail:
    msg: >-
      Failed to derive inbound agent secret for {{ jenkins_agent_hosts_node_local.name }}
      from Jenkins controller state on {{ jenkins_controller_host }}.
  when:
    - not ansible_check_mode
    - (jenkins_agent_hosts_secret_cmd.stdout | trim) == ''
