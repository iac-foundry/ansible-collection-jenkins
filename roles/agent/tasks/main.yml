---
- name: Preflight checks, variable resolution, and container identity facts
  ansible.builtin.import_tasks: preflight.yml

- name: Derive per-node inbound agent secret from Jenkins controller state
  ansible.builtin.import_tasks: controller_secret.yml

- name: Stage Git SSH known_hosts and private key for agent container
  ansible.builtin.import_tasks: git_ssh_material.yml

- name: Build inbound Jenkins worker image with required tooling
  ansible.builtin.import_tasks: image_build.yml
  when: not (jenkins_agent_hosts_skip_self_host_runtime_mutation | default(false) | bool)

- name: Run inbound Jenkins worker container
  ansible.builtin.import_tasks: runtime_container.yml
  when: not (jenkins_agent_hosts_skip_self_host_runtime_mutation | default(false) | bool)
