---
- name: Assert required inputs are supplied by the caller
  ansible.builtin.assert:
    that:
      - jenkins_agent_server_url | length > 0
    fail_msg: "jenkins_agent_server_url must be supplied by the caller."
  tags:
    - agent

- name: Record caller-supplied secret presence (never retrieved here)
  ansible.builtin.set_fact:
    jenkins_agent_secret_present: "{{ jenkins_agent_secret | length > 0 }}"
  no_log: true
  tags:
    - agent

- name: Scaffold convergence placeholder
  ansible.builtin.debug:
    msg: "Scaffold for agent: register jenkins agent with {{ jenkins_agent_server_url }}."
  tags:
    - agent
