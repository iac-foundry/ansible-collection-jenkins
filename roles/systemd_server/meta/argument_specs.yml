---
argument_specs:
  main:
    short_description: "systemd_server deployment of jenkins."
    options:
      jenkins_server_image:
        type: str
        required: true
        description: Image or package reference (caller-supplied; no org default).
      jenkins_server_http_port:
        type: int
        default: 8080
        description: HTTP port.
      jenkins_server_https_port:
        type: int
        default: 8443
        description: HTTPS port (used when TLS material is supplied).
      jenkins_server_data_dir:
        type: str
        default: "/var/lib/jenkins"
        description: Persistent data directory.
      jenkins_server_tls_cert:
        type: str
        default: ""
        description: PEM certificate; when set with the key, TLS is enabled automatically.
      jenkins_server_tls_key:
        type: str
        default: ""
        description: PEM private key paired with jenkins_server_tls_cert.
      jenkins_server_admin_secret:
        type: str
        default: ""
        description: Caller-supplied admin secret; never retrieved by this role.
