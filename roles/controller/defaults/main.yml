---
# Jenkins role defaults
# Multi-org note: consumer repos must override environment-specific values
# (URLs, Vault paths, OIDC groups/claims, shared library repos, DNS names).
jenkins_home: /opt/docker_volumes/jenkins
jenkins_base_image: "jenkins/jenkins"
jenkins_image_tag: "2.541.3-lts-jdk21"
jenkins_base_image_tag: "blueprint_jenkins:{{ jenkins_image_tag }}"
jenkins_root_url: "https://jenkins.internal/"
jenkins_shared_network_name: "platform_shared"
jenkins_user_uid: "1000"
jenkins_user_gid: "1000"
jenkins_docker_gid: ""
jenkins_proxy_enabled: false
jenkins_mailer_enabled: false
jenkins_proxy_legacy_container_name: "jenkins-nginx-proxy"
jenkins_proxy_container_name: "{{ host_proxy_container_name | default('host-proxy') }}"
jenkins_proxy_config_dir: "{{ host_proxy_config_dir | default('/opt/docker_volumes/host-proxy/conf.d') }}"
jenkins_proxy_ssl_dir: "{{ (host_proxy_ssl_dir | default('/opt/docker_volumes/host-proxy/ssl')) ~ '/jenkins' }}"
jenkins_proxy_vhost_filename: "10-jenkins.conf"
jenkins_proxy_server_name: "jenkins.internal"
jenkins_proxy_upstream: "http://127.0.0.1:{{ jenkins_http_port | default(8081) }}"
jenkins_proxy_tls_source: "provided" # allowed: provided, vault
jenkins_proxy_tls_vault_path: ""
jenkins_proxy_tls_cert_field: "cert"
jenkins_proxy_tls_key_field: "key"
jenkins_proxy_tls_ca_field: "ca"
jenkins_proxy_tls_cert_pem: ""
jenkins_proxy_tls_key_pem: ""
jenkins_proxy_tls_ca_pem: ""
jenkins_proxy_install_ca_into_host_trust: false

# Path to the internal CA certificate on the managed host. This cert is copied into
# the Docker build context and imported into the Jenkins JVM truststore so Jenkins
# can verify TLS connections to internal services (e.g. Authentik OIDC well-known).
jenkins_internal_ca_cert_path: "/usr/local/share/ca-certificates/step-ca-root.crt"
jenkins_internal_ca_cert_alias: "platform-internal-ca"

# JobDSL/JCasC catalog settings (override these in consumer repos)
jenkins_jobs_root_folder: "Jenkins Jobs"
jenkins_jobdsl_use_jenkins_credentials: true
jenkins_jobdsl_git_credentials_id: "bitbucket_ssh_key"
# Keep multibranch behavior safe by default: discover branches unless explicitly disabled.
jenkins_jobdsl_multibranch_discover_branches: true

# Global shared libraries loaded by Jenkins Pipeline (@Library('name@version')).
# credentials_id is optional for SSH-based Git when Jenkins host keys are pre-seeded.
jenkins_global_shared_libraries:
  - name: "jenkins_shared_lib"
    default_version: "main"
    implicit: false
    allow_version_override: true
    include_in_changesets: true
    repo_url: "git@example.invalid:platform/jenkins-shared-lib.git"
    credentials_id: ""

# Reuse controller-managed SSH material (typically provisioned from Vault)
# instead of storing SCM credentials in Jenkins.
jenkins_git_ssh_key_host_path: "/home/jenkins/.ssh/id_ed25519_infraops"
jenkins_git_known_hosts_host_path: "/home/jenkins/.ssh/known_hosts"
jenkins_git_ssh_config_host_path: "/home/jenkins/.ssh/config"

# Consumer repositories should define these.
jenkins_jobdsl_folders: []
jenkins_jobdsl_pipelines: []

# --- OIDC authentication (Authentik) ---
# Enables oic-auth plugin security realm backed by Authentik.
# Client credentials are read from Vault and injected into the JCasC secrets
# directory at deploy time; never stored in plaintext config files.
jenkins_oidc_enabled: false
jenkins_oidc_well_known_url: "https://auth.internal/application/o/jenkins/.well-known/openid-configuration"
jenkins_oidc_scopes: "openid profile email"
jenkins_oidc_username_field: "sub"
jenkins_oidc_full_name_field: "name"
jenkins_oidc_email_field: "email"
jenkins_oidc_groups_field: "groups"
jenkins_admin_group: "jenkins-admin"

# OIDC secret source controls (allowed: vars, env, vault)
jenkins_oidc_secret_source: "vars"
jenkins_oidc_client_id: ""
jenkins_oidc_client_secret: ""
jenkins_oidc_client_id_env_var: "JENKINS_OIDC_CLIENT_ID"
jenkins_oidc_client_secret_env_var: "JENKINS_OIDC_CLIENT_SECRET"

# Optional Vault secret source settings
jenkins_vault_addr: ""
jenkins_vault_token_file: ""
jenkins_vault_oidc_path: ""
jenkins_vault_oidc_client_id_field: "client_id"
jenkins_vault_oidc_client_secret_field: "client_secret"

# --- Escape hatch local admin ---
jenkins_escape_hatch_enabled: false
jenkins_escape_hatch_username: "jenkins-local-admin"
jenkins_escape_hatch_group: "{{ jenkins_admin_group }}"
jenkins_escape_hatch_secret_source: "vars" # allowed: vars, env, vault
jenkins_escape_hatch_password: ""
jenkins_escape_hatch_password_env_var: "JENKINS_ESCAPE_HATCH_PASSWORD"
jenkins_escape_hatch_generate_if_missing: false
jenkins_vault_escape_hatch_path: ""
jenkins_vault_escape_hatch_field: "password"

# --- JCasC secrets directory ---
# Ansible writes per-secret files here; JCasC resolves ${VAR_NAME} via DockerSecretSource.
# The host path is bind-mounted to /run/secrets inside the container.
# JCasC DockerSecretSource reads each file in /run/secrets/<name> as a secret.
# NOTE: CASC_SECRETS_PATH directory-based lookup was removed in JCasC 2077+; /run/secrets is used instead.
jenkins_jcasc_secrets_path: "{{ jenkins_home }}/jcasc-secrets"
jenkins_jcasc_secrets_container_path: "/run/secrets"
