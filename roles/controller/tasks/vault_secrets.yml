---
# vault_secrets.yml
# Reads Jenkins OIDC client credentials and escape hatch password from Vault,
# then writes them as individual files in the JCasC secrets directory.
# JCasC resolves ${jenkins-oidc-client-id} etc. from files in CASC_SECRETS_PATH.
#
# OIDC credentials must already exist in Vault (written by the iotel.security.authentik
# role when it provisions the Jenkins OIDC provider). This task fails fast if they
# are absent, enforcing correct provisioning order: Authentik → Jenkins.
#
# The escape hatch password is generated and stored to Vault on first run.

- name: Ensure Jenkins JCasC secrets directory exists
  ansible.builtin.file:
    path: "{{ jenkins_jcasc_secrets_path }}"
    state: directory
    owner: "{{ jenkins_user_uid }}"
    group: "{{ jenkins_user_gid }}"
    mode: '0700'
  become: true
  tags: [vault, config]

- name: Read Vault token file for Jenkins secret operations
  ansible.builtin.slurp:
    src: "{{ jenkins_vault_token_file }}"
  register: _jenkins_vault_token_file
  no_log: true
  failed_when: false
  tags: [vault]

- name: Assert Vault token file is readable for Jenkins secret operations
  ansible.builtin.assert:
    that:
      - (_jenkins_vault_token_file.failed | default(false)) == false
      - (_jenkins_vault_token_file.content | default('') | length) > 0
    fail_msg: >-
      Vault token file is not readable at {{ jenkins_vault_token_file }}.
      Ensure vault-agent is running on this host and the sink file is present.
  no_log: true
  tags: [vault]

# --- OIDC client credentials ---
# Must be pre-populated by the Authentik role. Fail fast if absent.

- name: Read Jenkins OIDC client credentials from Vault
  ansible.builtin.uri:
    url: >-
      {{ jenkins_vault_addr }}/v1/{{ jenkins_vault_oidc_path | regex_replace('^([^/]+)/', '\1/data/') }}
    method: GET
    headers:
      X-Vault-Token: "{{ _jenkins_vault_token_file['content'] | b64decode | trim }}"
    validate_certs: "{{ not (vault_client_tls_skip_verify | default(false)) }}"
    ca_path: "{{ vault_client_cacert | default('') }}"
    status_code: [200, 403, 404]
  register: _jenkins_oidc_vault_read
  changed_when: false
  no_log: true
  tags: [vault]

- name: Assert Jenkins OIDC Vault read status is valid
  ansible.builtin.assert:
    that:
      - (_jenkins_oidc_vault_read.status | int) in [200, 404]
    fail_msg: >-
      Failed to read Jenkins OIDC credentials from {{ jenkins_vault_oidc_path }}
      (HTTP {{ _jenkins_oidc_vault_read.status | default('unknown') }}).
      HTTP 403 indicates a Vault token policy problem that must be resolved.
  tags: [vault, verify]

- name: Extract Jenkins OIDC Vault data map when present
  ansible.builtin.set_fact:
    _jenkins_oidc_vault_data: >-
      {{
        (_jenkins_oidc_vault_read.json.data.data | default({}))
        if (_jenkins_oidc_vault_read.status | int) == 200
        else {}
      }}
  no_log: true
  tags: [vault]

- name: Assert Jenkins OIDC credentials are present in Vault
  ansible.builtin.assert:
    that:
      - (_jenkins_oidc_vault_read.status | int) == 200
      - (_jenkins_oidc_vault_data.get(jenkins_vault_oidc_client_id_field, '') | length) > 0
      - (_jenkins_oidc_vault_data.get(jenkins_vault_oidc_client_secret_field, '') | length) > 0
    fail_msg: >-
      Jenkins OIDC credentials are absent from Vault at {{ jenkins_vault_oidc_path }}
      (HTTP {{ _jenkins_oidc_vault_read.status | default('unknown') }}).
      The iotel.security.authentik role must run first to provision the Authentik
      OIDC provider and write credentials to Vault.
      Remediation:
      1) Run ansible/playbooks/deploy_authentik.yml (or ansible/playbooks/site.yml without restrictive tags).
      2) Re-run ansible/playbooks/build_stack.yml.
      If running with tags, include authentik/oidc tags before jenkins tags.
  tags: [vault, verify]

- name: Extract Jenkins OIDC credentials from Vault response
  ansible.builtin.set_fact:
    _jenkins_oidc_client_id: "{{ _jenkins_oidc_vault_data[jenkins_vault_oidc_client_id_field] }}"
    _jenkins_oidc_client_secret: "{{ _jenkins_oidc_vault_data[jenkins_vault_oidc_client_secret_field] }}"
  no_log: true
  tags: [vault]

# --- Escape hatch password ---
# Generated on first run and stored to Vault; read on all subsequent runs.

- name: Read Jenkins escape hatch password from Vault
  ansible.builtin.uri:
    url: >-
      {{ jenkins_vault_addr }}/v1/{{ jenkins_vault_escape_hatch_path | regex_replace('^([^/]+)/', '\1/data/') }}
    method: GET
    headers:
      X-Vault-Token: "{{ _jenkins_vault_token_file['content'] | b64decode | trim }}"
    validate_certs: "{{ not (vault_client_tls_skip_verify | default(false)) }}"
    ca_path: "{{ vault_client_cacert | default('') }}"
    status_code: [200, 403, 404]
  register: _jenkins_escape_hatch_vault_read
  changed_when: false
  no_log: true
  tags: [vault]

- name: Assert Vault escape hatch path returns a valid status
  ansible.builtin.assert:
    that:
      - (_jenkins_escape_hatch_vault_read.status | int) in [200, 404]
    fail_msg: >-
      Failed to read Jenkins escape hatch password from {{ jenkins_vault_escape_hatch_path }}
      (HTTP {{ _jenkins_escape_hatch_vault_read.status | default('unknown') }}).
      HTTP 403 indicates a Vault token policy problem that must be resolved.
  no_log: true
  tags: [vault]

- name: Generate Jenkins escape hatch password when absent from Vault
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
    _jenkins_escape_hatch_generated: true
  when: >-
    (_jenkins_escape_hatch_vault_read.status | int) == 404
    or (
      (_jenkins_escape_hatch_vault_read.status | int) == 200
      and (((_jenkins_escape_hatch_vault_read.json.data.data | default({})).get(jenkins_vault_escape_hatch_field, '') | length) == 0)
    )
  no_log: true
  tags: [vault]

- name: Store generated Jenkins escape hatch password to Vault
  ansible.builtin.uri:
    url: >-
      {{ jenkins_vault_addr }}/v1/{{ jenkins_vault_escape_hatch_path | regex_replace('^([^/]+)/', '\1/data/') }}
    method: POST
    headers:
      X-Vault-Token: "{{ _jenkins_vault_token_file['content'] | b64decode | trim }}"
    body_format: json
    body:
      data:
        "{{ jenkins_vault_escape_hatch_field }}": "{{ _jenkins_escape_hatch_password }}"
    validate_certs: "{{ not (vault_client_tls_skip_verify | default(false)) }}"
    ca_path: "{{ vault_client_cacert | default('') }}"
    status_code: [200, 204, 400, 403, 404, 500]
  when: _jenkins_escape_hatch_generated | default(false)
  register: _jenkins_escape_hatch_vault_write
  no_log: true
  tags: [vault]

- name: Assert escape hatch password write to Vault succeeded
  ansible.builtin.assert:
    that:
      - (_jenkins_escape_hatch_vault_write.status | int) in [200, 204]
    fail_msg: >-
      Failed to write Jenkins escape hatch password to {{ jenkins_vault_escape_hatch_path }}
      (HTTP {{ _jenkins_escape_hatch_vault_write.status | default('unknown') }}).
      HTTP 403: Vault token policy denies create/update on this path.
      HTTP 404: KV path or mount translation is invalid.
      HTTP 400/500: Vault rejected the payload or encountered a server error.
  when: _jenkins_escape_hatch_generated | default(false)
  tags: [vault]

- name: Extract Jenkins escape hatch Vault data map when present
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_vault_data: >-
      {{
        (_jenkins_escape_hatch_vault_read.json.data.data | default({}))
        if (_jenkins_escape_hatch_vault_read.status | int) == 200
        else {}
      }}
  no_log: true
  tags: [vault]

- name: Extract Jenkins escape hatch password from existing Vault secret
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_password: >-
      {{ _jenkins_escape_hatch_vault_data[jenkins_vault_escape_hatch_field] }}
  when:
    - (_jenkins_escape_hatch_vault_read.status | int) == 200
    - not (_jenkins_escape_hatch_generated | default(false))
  no_log: true
  tags: [vault]

# --- Write JCasC secret files ---
# One file per secret; JCasC resolves ${filename} → file contents.

- name: Write Jenkins JCasC secret files
  ansible.builtin.copy:
    dest: "{{ jenkins_jcasc_secrets_path }}/{{ item.name }}"
    content: "{{ item.content }}"
    owner: "{{ jenkins_user_uid }}"
    group: "{{ jenkins_user_gid }}"
    mode: '0600'
  loop:
    - name: jenkins-oidc-client-id
      content: "{{ _jenkins_oidc_client_id }}"
    - name: jenkins-oidc-client-secret
      content: "{{ _jenkins_oidc_client_secret }}"
    - name: jenkins-escape-hatch-password
      content: "{{ _jenkins_escape_hatch_password }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  become: true
  notify: Restart Jenkins after JCasC or init updates
  tags: [vault, config]
