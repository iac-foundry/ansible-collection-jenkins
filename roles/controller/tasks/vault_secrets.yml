---
# Resolve JCasC secrets from caller-selected sources.
# Supported secret sources: vars, env, vault.

- name: Ensure Jenkins JCasC secrets directory exists
  ansible.builtin.file:
    path: "{{ jenkins_jcasc_secrets_path }}"
    state: directory
    owner: "{{ jenkins_user_uid }}"
    group: "{{ jenkins_user_gid }}"
    mode: '0700'
  become: true
  tags: [config, secrets]

- name: Validate configured Jenkins secret source options
  ansible.builtin.assert:
    that:
      - jenkins_oidc_secret_source in ['vars', 'env', 'vault']
      - jenkins_escape_hatch_secret_source in ['vars', 'env', 'vault']
    fail_msg: >-
      Invalid Jenkins secret source configuration.
      Allowed values for jenkins_oidc_secret_source and
      jenkins_escape_hatch_secret_source are: vars, env, vault.
  tags: [config, secrets]

- name: Initialize derived Jenkins secret facts
  ansible.builtin.set_fact:
    _jenkins_oidc_client_id: ""
    _jenkins_oidc_client_secret: ""
    _jenkins_escape_hatch_password: ""
  no_log: true
  tags: [config, secrets]

- name: Resolve Jenkins OIDC credentials from explicit vars
  ansible.builtin.set_fact:
    _jenkins_oidc_client_id: "{{ jenkins_oidc_client_id | default('') | string | trim }}"
    _jenkins_oidc_client_secret: "{{ jenkins_oidc_client_secret | default('') | string | trim }}"
  when:
    - jenkins_oidc_enabled | default(false) | bool
    - jenkins_oidc_secret_source == 'vars'
  no_log: true
  tags: [config, secrets]

- name: Resolve Jenkins OIDC credentials from environment variables
  ansible.builtin.set_fact:
    _jenkins_oidc_client_id: "{{ lookup('env', jenkins_oidc_client_id_env_var, default='') | string | trim }}"
    _jenkins_oidc_client_secret: "{{ lookup('env', jenkins_oidc_client_secret_env_var, default='') | string | trim }}"
  when:
    - jenkins_oidc_enabled | default(false) | bool
    - jenkins_oidc_secret_source == 'env'
  no_log: true
  tags: [config, secrets]

- name: Read Vault token file for Jenkins secret operations
  ansible.builtin.slurp:
    src: "{{ jenkins_vault_token_file }}"
  register: _jenkins_vault_token_file
  no_log: true
  failed_when: false
  when:
    - (jenkins_oidc_enabled | default(false) | bool and jenkins_oidc_secret_source == 'vault')
      or (jenkins_escape_hatch_enabled | default(false) | bool and jenkins_escape_hatch_secret_source == 'vault')
  tags: [config, secrets, vault]

- name: Assert Vault token file is readable when vault source is enabled
  ansible.builtin.assert:
    that:
      - (jenkins_vault_addr | default('') | string | trim | length) > 0
      - (jenkins_vault_token_file | default('') | string | trim | length) > 0
      - (_jenkins_vault_token_file.failed | default(false)) == false
      - (_jenkins_vault_token_file.content | default('') | length) > 0
    fail_msg: >-
      Vault secret source requires jenkins_vault_addr and jenkins_vault_token_file,
      and the token file must be readable.
  no_log: true
  when:
    - (jenkins_oidc_enabled | default(false) | bool and jenkins_oidc_secret_source == 'vault')
      or (jenkins_escape_hatch_enabled | default(false) | bool and jenkins_escape_hatch_secret_source == 'vault')
  tags: [config, secrets, vault]

- name: Read Jenkins OIDC client credentials from Vault
  ansible.builtin.uri:
    url: "{{ jenkins_vault_addr }}/v1/{{ jenkins_vault_oidc_path | regex_replace('^([^/]+)/', '\\1/data/') }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _jenkins_vault_token_file['content'] | b64decode | trim }}"
    validate_certs: "{{ not (vault_client_tls_skip_verify | default(false)) }}"
    ca_path: "{{ vault_client_cacert | default('') }}"
    status_code: [200, 403, 404]
  register: _jenkins_oidc_vault_read
  changed_when: false
  no_log: true
  when:
    - jenkins_oidc_enabled | default(false) | bool
    - jenkins_oidc_secret_source == 'vault'
    - (jenkins_vault_oidc_path | default('') | string | trim | length) > 0
  tags: [config, secrets, vault]

- name: Assert Jenkins OIDC vault settings are valid
  ansible.builtin.assert:
    that:
      - (jenkins_vault_oidc_path | default('') | string | trim | length) > 0
      - (_jenkins_oidc_vault_read.status | int) == 200
    fail_msg: >-
      OIDC vault secret source requires jenkins_vault_oidc_path and a successful read.
      Ensure path exists and token policy grants read access.
  when:
    - jenkins_oidc_enabled | default(false) | bool
    - jenkins_oidc_secret_source == 'vault'
  tags: [config, secrets, vault]

- name: Extract Jenkins OIDC credentials from Vault response
  ansible.builtin.set_fact:
    _jenkins_oidc_client_id: "{{ (_jenkins_oidc_vault_read.json.data.data | default({})).get(jenkins_vault_oidc_client_id_field, '') | string | trim }}"
    _jenkins_oidc_client_secret: "{{ (_jenkins_oidc_vault_read.json.data.data | default({})).get(jenkins_vault_oidc_client_secret_field, '') | string | trim }}"
  no_log: true
  when:
    - jenkins_oidc_enabled | default(false) | bool
    - jenkins_oidc_secret_source == 'vault'
  tags: [config, secrets, vault]

- name: Resolve Jenkins escape hatch password from explicit var
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_password: "{{ jenkins_escape_hatch_password | default('') | string | trim }}"
  when:
    - jenkins_escape_hatch_enabled | default(false) | bool
    - jenkins_escape_hatch_secret_source == 'vars'
  no_log: true
  tags: [config, secrets]

- name: Resolve Jenkins escape hatch password from environment variable
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_password: "{{ lookup('env', jenkins_escape_hatch_password_env_var, default='') | string | trim }}"
  when:
    - jenkins_escape_hatch_enabled | default(false) | bool
    - jenkins_escape_hatch_secret_source == 'env'
  no_log: true
  tags: [config, secrets]

- name: Read Jenkins escape hatch password from Vault
  ansible.builtin.uri:
    url: "{{ jenkins_vault_addr }}/v1/{{ jenkins_vault_escape_hatch_path | regex_replace('^([^/]+)/', '\\1/data/') }}"
    method: GET
    headers:
      X-Vault-Token: "{{ _jenkins_vault_token_file['content'] | b64decode | trim }}"
    validate_certs: "{{ not (vault_client_tls_skip_verify | default(false)) }}"
    ca_path: "{{ vault_client_cacert | default('') }}"
    status_code: [200, 403, 404]
  register: _jenkins_escape_hatch_vault_read
  changed_when: false
  no_log: true
  when:
    - jenkins_escape_hatch_enabled | default(false) | bool
    - jenkins_escape_hatch_secret_source == 'vault'
    - (jenkins_vault_escape_hatch_path | default('') | string | trim | length) > 0
  tags: [config, secrets, vault]

- name: Assert escape hatch vault settings are valid
  ansible.builtin.assert:
    that:
      - (jenkins_vault_escape_hatch_path | default('') | string | trim | length) > 0
      - (_jenkins_escape_hatch_vault_read.status | int) in [200, 404]
    fail_msg: >-
      Escape hatch vault secret source requires jenkins_vault_escape_hatch_path
      and vault access to read that path.
  when:
    - jenkins_escape_hatch_enabled | default(false) | bool
    - jenkins_escape_hatch_secret_source == 'vault'
  tags: [config, secrets, vault]

- name: Extract escape hatch password from Vault when present
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_password: "{{ (_jenkins_escape_hatch_vault_read.json.data.data | default({})).get(jenkins_vault_escape_hatch_field, '') | string | trim }}"
  when:
    - jenkins_escape_hatch_enabled | default(false) | bool
    - jenkins_escape_hatch_secret_source == 'vault'
    - (_jenkins_escape_hatch_vault_read.status | int) == 200
  no_log: true
  tags: [config, secrets, vault]

- name: Generate Jenkins escape hatch password when allowed and missing
  ansible.builtin.set_fact:
    _jenkins_escape_hatch_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when:
    - jenkins_escape_hatch_enabled | default(false) | bool
    - (jenkins_escape_hatch_generate_if_missing | default(false)) | bool
    - (_jenkins_escape_hatch_password | default('') | string | trim | length) == 0
  no_log: true
  tags: [config, secrets]

- name: Assert OIDC credentials are present when OIDC is enabled
  ansible.builtin.assert:
    that:
      - (_jenkins_oidc_client_id | default('') | string | trim | length) > 0
      - (_jenkins_oidc_client_secret | default('') | string | trim | length) > 0
    fail_msg: >-
      OIDC is enabled but client credentials were not resolved.
      Provide values using the configured jenkins_oidc_secret_source.
  when: jenkins_oidc_enabled | default(false) | bool
  no_log: true
  tags: [config, secrets, verify]

- name: Assert escape hatch password is present when escape hatch is enabled
  ansible.builtin.assert:
    that:
      - (_jenkins_escape_hatch_password | default('') | string | trim | length) > 0
    fail_msg: >-
      Escape hatch is enabled but no password was resolved.
      Provide jenkins_escape_hatch_password, environment variable source,
      vault source, or enable jenkins_escape_hatch_generate_if_missing.
  when: jenkins_escape_hatch_enabled | default(false) | bool
  no_log: true
  tags: [config, secrets, verify]

- name: Write Jenkins JCasC secret files
  ansible.builtin.copy:
    dest: "{{ jenkins_jcasc_secrets_path }}/{{ item.name }}"
    content: "{{ item.content }}"
    owner: "{{ jenkins_user_uid }}"
    group: "{{ jenkins_user_gid }}"
    mode: '0600'
  loop: "{{ _jenkins_jcasc_secret_files }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  become: true
  notify: Restart Jenkins after JCasC or init updates
  vars:
    _jenkins_jcasc_secret_files: >-
      {{
        ([]
         + ([{'name': 'jenkins-oidc-client-id', 'content': _jenkins_oidc_client_id},
             {'name': 'jenkins-oidc-client-secret', 'content': _jenkins_oidc_client_secret}] if (jenkins_oidc_enabled | default(false) | bool) else [])
         + ([{'name': 'jenkins-escape-hatch-password', 'content': _jenkins_escape_hatch_password}] if (jenkins_escape_hatch_enabled | default(false) | bool) else [])
        )
      }}
  when: _jenkins_jcasc_secret_files | length > 0
  tags: [config, secrets]
