---
- name: Render Jenkins Dockerfile template to remote host
  ansible.builtin.template:
    src: "Dockerfile_Jenkins.j2"
    dest: "/tmp/Dockerfile_Jenkins"
    mode: "0644"
  register: jenkins_dockerfile_copy

- name: Render Jenkins plugins list to remote host
  ansible.builtin.template:
    src: "jenkins-plugins.txt.j2"
    dest: "/tmp/jenkins-plugins.txt"
    mode: "0644"
  register: jenkins_plugins_copy

# Copy the internal CA cert into the Docker build context so it can be imported
# into the Jenkins JVM truststore during image build. Required for Jenkins to verify
# TLS connections to internal services such as the Authentik OIDC well-known endpoint.
- name: Copy IOTel internal CA cert to Docker build context
  ansible.builtin.copy:
    src: "{{ jenkins_internal_ca_cert_path }}"
    dest: "/tmp/iotel-ca.crt"
    mode: "0644"
    remote_src: true
  register: jenkins_ca_cert_copy

# attempt to discover Docker group ID if not explicitly provided
- name: Get Docker group ID from host
  ansible.builtin.command: getent group docker
  register: jenkins_docker_group_info
  changed_when: false

- name: Extract Docker GID
  ansible.builtin.set_fact:
    jenkins_docker_gid: "{{ jenkins_docker_group_info.stdout.split(':')[2] }}"
  when: jenkins_docker_group_info.stdout is defined and jenkins_docker_group_info.stdout|length > 0 and (jenkins_docker_group_info.stdout.split(':')|length > 2)

- name: Get GID from docker socket if group lookup failed
  ansible.builtin.stat:
    path: /var/run/docker.sock
  register: jenkins_docker_sock_stat
  when: jenkins_docker_gid is not defined

- name: Use socket stat GID as docker_gid when available
  ansible.builtin.set_fact:
    jenkins_docker_gid: "{{ jenkins_docker_sock_stat.stat.gid | string }}"
  when: jenkins_docker_sock_stat.stat is defined and jenkins_docker_sock_stat.stat.gid is defined and jenkins_docker_gid is not defined

- name: Check alternate docker socket path (/run/docker.sock)
  ansible.builtin.stat:
    path: /run/docker.sock
  register: jenkins_docker_sock_stat_alt
  when: jenkins_docker_gid is not defined

- name: Use alternate socket stat GID as docker_gid when available
  ansible.builtin.set_fact:
    jenkins_docker_gid: "{{ jenkins_docker_sock_stat_alt.stat.gid | string }}"
  when: jenkins_docker_sock_stat_alt.stat is defined and jenkins_docker_sock_stat_alt.stat.gid is defined and jenkins_docker_gid is not defined

- name: Use inventory fallback for docker_gid when available
  ansible.builtin.set_fact:
    jenkins_docker_gid: "{{ jenkins_docker_gid | string }}"
  when: jenkins_docker_gid is not defined and (jenkins_docker_gid is defined)

- name: Fail when Docker GID cannot be determined
  ansible.builtin.fail:
    msg: |-
      Could not determine the docker group GID. Diagnostics:
      - getent group docker: '{{ jenkins_docker_group_info.stdout | default("<empty>") }}'
      - /var/run/docker.sock GID: '{{ jenkins_docker_sock_stat.stat.gid | default("<missing>") }}'
      - inventory jenkins_docker_gid: '{{ jenkins_docker_gid | default("<undefined>") }}'
      Ensure Docker is installed on the host, the socket path exists, or set `jenkins_docker_gid` in inventory.
  when: jenkins_docker_gid is not defined and (jenkins_docker_gid is not defined)

- name: Validate required Jenkins role inputs
  ansible.builtin.assert:
    that:
      - jenkins_docker_gid | string | length > 0
      - (jenkins_user_uid | default('1000')) | string | length > 0
      - (jenkins_user_gid | default('1000')) | string | length > 0
    fail_msg: >-
      Required variables missing. Define `jenkins_docker_gid` in inventory/group vars
      (user IDs default to 1000 if not supplied).
    success_msg: "Required Jenkins inputs are present."

- name: Debug Docker GID
  ansible.builtin.debug:
    msg: "Docker GID is {{ jenkins_docker_gid }}"

- name: Check if Jenkins image already exists
  community.docker.docker_image_info:
    name: "{{ jenkins_base_image_tag }}"
  register: jenkins_existing_image_info
  ignore_errors: true

- name: Build custom Jenkins image with tools
  community.docker.docker_image:
    name: "{{ jenkins_base_image_tag }}"
    build:
      path: "/tmp"
      dockerfile: Dockerfile_Jenkins
      args:
        DOCKER_GID: "{{ jenkins_docker_gid }}"
    source: build
    # force_source must include plugins changes: if only jenkins-plugins.txt changed,
    # the Dockerfile hasn't changed so Docker would skip rebuilding the existing image
    # unless we explicitly force it.
    force_source: "{{ jenkins_dockerfile_copy.changed or jenkins_plugins_copy.changed or jenkins_ca_cert_copy.changed }}"
  when: jenkins_dockerfile_copy.changed or jenkins_plugins_copy.changed or jenkins_ca_cert_copy.changed or (jenkins_existing_image_info.images | length == 0)
