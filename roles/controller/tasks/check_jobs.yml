---
# Verify Jenkins jobs from `jenkins_jobs` exist; if any are missing,
# restart the Jenkins container so JCasC + JobDSL are re-applied.

- name: Check if configured Jenkins jobs exist
  vars:
    job_path: >-
      {{
        ((item.folder | default('')) ~ '/' ~ (item.job_name | default('main')))
        .split('/')
        | reject('equalto', '')
        | map('replace', ' ', '%20')
        | map('regex_replace', '^', '/job/')
        | join('')
      }}
    job_url: "http://127.0.0.1:{{ jenkins_http_port | default(8081) }}{{ job_path }}/api/json"
  ansible.builtin.uri:
    url: "{{ job_url }}"
    method: GET
    status_code: 200
    return_content: false
    validate_certs: false
  register: jenkins_job_checks
  failed_when: false
  changed_when: false
  loop: "{{ jenkins_jobs | default([]) }}"
  loop_control:
    label: "{{ item.folder }} / {{ item.job_name | default('main') }}"

- name: Assemble list of missing jobs
  ansible.builtin.set_fact:
    jenkins_missing_jobs: >-
      {{ (jenkins_missing_jobs | default([])) + [ job_item.job_name | default('main') ~ ' in ' ~ job_item.folder ] }}
  loop: "{{ (jenkins_jobs | default([])) | zip(jenkins_job_checks.results) | list }}"
  vars:
    job_item: "{{ item.0 }}"
    job_result: "{{ item.1 }}"
  when: job_result.status is not defined or job_result.status != 200

- name: Restart Jenkins to re-apply JCasC/JobDSL when jobs are missing
  community.docker.docker_container:
    name: jenkins
    state: started
    restart: true
  when: (jenkins_missing_jobs | default([])) | length > 0

- name: Wait for Jenkins to become available after restart (if any)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ jenkins_http_port | default(8081) }}/login"
    method: GET
    status_code: [200, 403]
    validate_certs: false
  register: jenkins_job_reload_health
  until: jenkins_job_reload_health.status in [200, 403]
  retries: 30
  delay: 10
  when: jenkins_missing_jobs | default([]) | length | bool
