---
- name: Remove legacy Jenkins dedicated nginx proxy container
  community.docker.docker_container:
    name: "{{ jenkins_proxy_legacy_container_name }}"
    state: absent
  when: jenkins_proxy_enabled | bool

- name: Ensure Jenkins nginx proxy directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ jenkins_proxy_config_dir }}"
      mode: '0755'
    - path: "{{ jenkins_proxy_ssl_dir }}"
      mode: '0700'
  when: jenkins_proxy_enabled | bool

- name: Assert shared host proxy config directory is present
  ansible.builtin.stat:
    path: "{{ jenkins_proxy_config_dir }}"
  register: jenkins_proxy_config_dir_stat
  when: jenkins_proxy_enabled | bool

- name: Fail when shared host proxy baseline is missing
  ansible.builtin.assert:
    that:
      - jenkins_proxy_config_dir_stat.stat.exists
      - jenkins_proxy_config_dir_stat.stat.isdir
    fail_msg: >-
      Shared host proxy baseline is not ready (missing {{ jenkins_proxy_config_dir }}).
      Run baseline host-proxy role before running Jenkins proxy integration.
  when: jenkins_proxy_enabled | bool

- name: Validate Jenkins proxy TLS source option
  ansible.builtin.assert:
    that:
      - jenkins_proxy_tls_source in ['provided', 'vault']
    fail_msg: >-
      Invalid jenkins_proxy_tls_source '{{ jenkins_proxy_tls_source }}'.
      Allowed values: provided, vault.
  when: jenkins_proxy_enabled | bool

- name: Verify Vault CLI connectivity for Jenkins proxy TLS fetch
  ansible.builtin.command:
    argv: [vault, status]
  environment:
    VAULT_ADDR: "{{ jenkins_vault_addr | default(vault_local_addr | default('http://127.0.0.1:8100')) }}"
    VAULT_CACERT: "{{ vault_client_cacert | default('') }}"
    VAULT_SKIP_VERIFY: "{{ 'true' if (vault_client_tls_skip_verify | default(false)) else 'false' }}"
  register: jenkins_proxy_vault_status
  changed_when: false
  failed_when: jenkins_proxy_vault_status.rc != 0
  when:
    - jenkins_proxy_enabled | bool
    - jenkins_proxy_tls_source == 'vault'

- name: Assert proxy Vault path is provided for vault TLS source
  ansible.builtin.assert:
    that:
      - (jenkins_proxy_tls_vault_path | default('') | string | trim | length) > 0
    fail_msg: >-
      jenkins_proxy_tls_source=vault requires jenkins_proxy_tls_vault_path.
  when:
    - jenkins_proxy_enabled | bool
    - jenkins_proxy_tls_source == 'vault'

- name: Fetch Jenkins TLS secret bundle from Vault
  ansible.builtin.command:
    argv:
      - vault
      - kv
      - get
      - -format=json
      - "{{ jenkins_proxy_tls_vault_path }}"
  environment:
    VAULT_ADDR: "{{ jenkins_vault_addr | default(vault_local_addr | default('http://127.0.0.1:8100')) }}"
    VAULT_CACERT: "{{ vault_client_cacert | default('') }}"
    VAULT_SKIP_VERIFY: "{{ 'true' if (vault_client_tls_skip_verify | default(false)) else 'false' }}"
  register: jenkins_proxy_tls_secret_raw
  changed_when: false
  no_log: true
  when:
    - jenkins_proxy_enabled | bool
    - jenkins_proxy_tls_source == 'vault'

- name: Parse and extract Jenkins TLS PEM material from Vault
  ansible.builtin.set_fact:
    jenkins_proxy_tls_secret: "{{ (jenkins_proxy_tls_secret_raw.stdout | from_json).data.data }}"
    jenkins_proxy_tls_cert_pem: "{{ ((jenkins_proxy_tls_secret_raw.stdout | from_json).data.data)[jenkins_proxy_tls_cert_field] | default('') | string | trim }}"
    jenkins_proxy_tls_key_pem: "{{ ((jenkins_proxy_tls_secret_raw.stdout | from_json).data.data)[jenkins_proxy_tls_key_field] | default('') | string | trim }}"
    jenkins_proxy_tls_ca_pem: "{{ ((jenkins_proxy_tls_secret_raw.stdout | from_json).data.data)[jenkins_proxy_tls_ca_field] | default('') | string | trim }}"
  no_log: true
  when:
    - jenkins_proxy_enabled | bool
    - jenkins_proxy_tls_source == 'vault'

- name: Assert Jenkins TLS material is provided
  ansible.builtin.assert:
    that:
      - (jenkins_proxy_tls_cert_pem | default('') | string | trim | length) > 0
      - (jenkins_proxy_tls_key_pem | default('') | string | trim | length) > 0
      - (jenkins_proxy_tls_ca_pem | default('') | string | trim | length) > 0
    fail_msg: >-
      Jenkins proxy TLS requires non-empty cert/key/ca PEM values.
      Provide via vars (jenkins_proxy_tls_*_pem) or set jenkins_proxy_tls_source=vault
      with valid Vault path and fields.
  when: jenkins_proxy_enabled | bool

- name: Validate and install Jenkins nginx TLS assets
  when: jenkins_proxy_enabled | bool
  no_log: true
  block:
    - name: Create temporary directory for Jenkins TLS validation
      ansible.builtin.tempfile:
        state: directory
        suffix: jenkins-proxy-tls
      register: jenkins_proxy_tls_temp_dir
      changed_when: false

    - name: Stage Jenkins TLS certificate for validation
      ansible.builtin.copy:
        content: "{{ jenkins_proxy_tls_cert_pem }}\n"
        dest: "{{ jenkins_proxy_tls_temp_dir.path }}/server.crt"
        owner: root
        group: root
        mode: '0600'
      changed_when: false

    - name: Stage Jenkins TLS private key for validation
      ansible.builtin.copy:
        content: "{{ jenkins_proxy_tls_key_pem }}\n"
        dest: "{{ jenkins_proxy_tls_temp_dir.path }}/server.key"
        owner: root
        group: root
        mode: '0600'
      changed_when: false

    - name: Stage Jenkins TLS CA bundle for validation
      ansible.builtin.copy:
        content: "{{ jenkins_proxy_tls_ca_pem }}\n"
        dest: "{{ jenkins_proxy_tls_temp_dir.path }}/ca.crt"
        owner: root
        group: root
        mode: '0600'
      changed_when: false

    - name: Validate Jenkins TLS certificate
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "{{ jenkins_proxy_tls_temp_dir.path }}/server.crt"
          - -noout
          - -subject
      changed_when: false

    - name: Validate Jenkins TLS private key
      ansible.builtin.command:
        argv:
          - openssl
          - pkey
          - -in
          - "{{ jenkins_proxy_tls_temp_dir.path }}/server.key"
          - -noout
      changed_when: false

    - name: Ensure Jenkins TLS certificate matches private key
      ansible.builtin.shell: |
        set -euo pipefail
        cert_pub=$(openssl x509 -in "{{ jenkins_proxy_tls_temp_dir.path }}/server.crt" -pubkey -noout | openssl pkey -pubin -outform DER | openssl dgst -sha256)
        key_pub=$(openssl pkey -in "{{ jenkins_proxy_tls_temp_dir.path }}/server.key" -pubout -outform DER | openssl dgst -sha256)
        [[ "$cert_pub" == "$key_pub" ]]
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install Jenkins nginx TLS assets
      ansible.builtin.copy:
        content: "{{ item.content }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - dest: "{{ jenkins_proxy_ssl_dir }}/server.crt"
          content: "{{ jenkins_proxy_tls_cert_pem }}\n"
          mode: '0644'
        - dest: "{{ jenkins_proxy_ssl_dir }}/server.key"
          content: "{{ jenkins_proxy_tls_key_pem }}\n"
          mode: '0600'
        - dest: "{{ jenkins_proxy_ssl_dir }}/ca.crt"
          content: "{{ jenkins_proxy_tls_ca_pem }}\n"
          mode: '0644'
        - dest: "{{ jenkins_proxy_ssl_dir }}/fullchain.crt"
          content: "{{ jenkins_proxy_tls_cert_pem }}\n{{ jenkins_proxy_tls_ca_pem }}\n"
          mode: '0644'
      register: jenkins_proxy_ssl_copy

  always:
    - name: Remove temporary Jenkins TLS validation directory
      ansible.builtin.file:
        path: "{{ jenkins_proxy_tls_temp_dir.path | default('') }}"
        state: absent
      when: (jenkins_proxy_tls_temp_dir.path | default('') | length) > 0
      changed_when: false

- name: Install Jenkins proxy CA into system trust store
  ansible.builtin.copy:
    content: "{{ jenkins_proxy_tls_ca_pem }}\n"
    dest: "/usr/local/share/ca-certificates/jenkins-proxy-ca.crt"
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Refresh system CA trust store after Jenkins proxy CA install
  when:
    - jenkins_proxy_enabled | bool
    - jenkins_proxy_install_ca_into_host_trust | default(false) | bool
    - (jenkins_proxy_tls_ca_pem | default('') | trim | length) > 0

- name: Flush handlers so CA trust is updated before HTTPS validation
  ansible.builtin.meta: flush_handlers
  when:
    - jenkins_proxy_enabled | bool
    - jenkins_proxy_install_ca_into_host_trust | default(false) | bool

- name: Deploy Jenkins nginx proxy configuration
  ansible.builtin.template:
    src: jenkins_proxy.conf.j2
    dest: "{{ jenkins_proxy_config_dir }}/{{ jenkins_proxy_vhost_filename }}"
    owner: root
    group: root
    mode: '0644'
  register: jenkins_proxy_config_copy
  notify: Reload shared host proxy
  when: jenkins_proxy_enabled | bool

- name: Trigger shared host proxy reload when Jenkins TLS assets change
  ansible.builtin.debug:
    msg: "Jenkins TLS assets updated; reloading shared host proxy"
  changed_when: >-
    (((jenkins_proxy_ssl_copy.results | default([])) | selectattr('changed') | list | length) > 0)
  notify: Reload shared host proxy
  when: jenkins_proxy_enabled | bool

- name: Flush handlers so shared host proxy is reloaded before endpoint check
  ansible.builtin.meta: flush_handlers
  when: jenkins_proxy_enabled | bool

- name: Wait for Jenkins nginx proxy HTTPS endpoint
  ansible.builtin.uri:
    url: "https://{{ jenkins_proxy_server_name }}/"
    validate_certs: true
    status_code: [200, 301, 302, 403]
  register: jenkins_proxy_https_check
  failed_when: false
  retries: 10
  delay: 2
  until: jenkins_proxy_https_check.status is defined
  changed_when: false
  when: jenkins_proxy_enabled | bool
