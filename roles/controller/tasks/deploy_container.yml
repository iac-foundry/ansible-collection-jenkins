---
- name: Deploy Jenkins Server
  community.docker.docker_container:
    name: jenkins
    image: "{{ jenkins_base_image_tag }}"
    state: started
    restart_policy: unless-stopped
    pull: false
    networks:
      - name: "{{ jenkins_shared_network_name }}"
    published_ports:
      - "{{ jenkins_http_port }}:8080"
      - "50000:50000"
    volumes:
      - "{{ jenkins_home }}:/var/jenkins_home"
      - /var/run/docker.sock:/var/run/docker.sock
      # JCasC DockerSecretSource reads individual secret files from /run/secrets/<name>.
      # Bind-mount the secrets directory here; CASC_SECRETS_PATH is not used (removed in JCasC 2077+).
      - "{{ jenkins_jcasc_secrets_path }}:/run/secrets:ro"
    etc_hosts:
      iot-vcsa01.iotel.io: "192.168.115.100"
    security_opts:
      - apparmor=unconfined
    env:
      JAVA_OPTS: >-
        -Xms4g -Xmx8g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
        -XX:+AlwaysPreTouch -XX:+ParallelRefProcEnabled
        -XX:+HeapDumpOnOutOfMemoryError
        -Djenkins.install.runSetupWizard=false
        -Djava.net.preferIPv4Stack=true
        -Dfile.encoding=UTF-8
        -Djenkins.winstone.maxThreads=100
      JAVA_TOOL_OPTIONS: "-XX:+UseStringDeduplication"
      JENKINS_OPTS: "--webroot=/var/jenkins_home/war"
      CASC_JENKINS_CONFIG: "/var/jenkins_home/casc_configs/jenkins.yaml"
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      TZ: "Africa/Johannesburg"
    memory: "12g"
    memory_reservation: "6g"
    cpus: 4
    shm_size: 1g

- name: Flush handlers so Jenkins restarts immediately after container deployment
  ansible.builtin.meta: flush_handlers
