---
- name: Assert required inputs are supplied by the caller
  ansible.builtin.assert:
    that:
      - jenkins_server_image | length > 0
    fail_msg: "jenkins_server_image must be supplied by the caller (no org-specific default)."
    success_msg: "Required inputs present."
  tags:
    - kubernetes_server

- name: Determine whether TLS material was supplied
  ansible.builtin.set_fact:
    jenkins_server_tls_enabled: "{{ (jenkins_server_tls_cert | length > 0) and (jenkins_server_tls_key | length > 0) }}"
  tags:
    - kubernetes_server

- name: Record caller-supplied secret presence (the secret is an input, never retrieved here)
  ansible.builtin.set_fact:
    jenkins_server_admin_secret_present: "{{ jenkins_server_admin_secret | length > 0 }}"
  no_log: true
  tags:
    - kubernetes_server

- name: Scaffold convergence placeholder
  ansible.builtin.debug:
    msg: >-
      Scaffold for kubernetes_server: implement jenkins using the common server interface.
      TLS enabled={{ jenkins_server_tls_enabled }}.
  tags:
    - kubernetes_server
